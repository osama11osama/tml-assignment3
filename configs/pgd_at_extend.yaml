# Phase 4 — extend PGD-AT from epoch 80 checkpoint (resume on cluster)
architecture: resnet18
epochs: 120
batch_size: 256
lr: 0.01
momentum: 0.9
weight_decay: 0.0005
milestones: [50, 70]
gamma: 0.1
val_fraction: 0.1
pgd_eps: 0.031372549  # 8/255
pgd_alpha: 0.007843137  # 2/255
pgd_train_steps: 10
pgd_eval_steps: 20
robust_every: 0
num_workers: 4
save_every: 3
tag: pgd_at
# Resume from results/runs/pgd_at_resnet18/last.pt (no init)
output: results/checkpoints/pgd_at_resnet18.pt
