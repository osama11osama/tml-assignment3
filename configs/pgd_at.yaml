# Step 3 — PGD adversarial training (Madry AT)
architecture: resnet18
epochs: 80
batch_size: 128
lr: 0.01
momentum: 0.9
weight_decay: 0.0005
milestones: [50, 70]
gamma: 0.1
val_fraction: 0.1
pgd_eps: 0.031372549  # 8/255
pgd_alpha: 0.007843137  # 2/255
pgd_train_steps: 7
pgd_eval_steps: 20
robust_every: 10
num_workers: 2
save_every: 5
init: results/checkpoints/fgsm_at_resnet18.pt
output: results/checkpoints/pgd_at_resnet18.pt
