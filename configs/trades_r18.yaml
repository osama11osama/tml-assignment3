# Week 1 Track B — TRADES fine-tune from PGD-AT R18
architecture: resnet18
epochs: 40
batch_size: 128
lr: 0.005
momentum: 0.9
weight_decay: 0.0005
milestones: [25, 35]
gamma: 0.1
